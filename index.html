<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#17130f">
    <meta name="apple-mobile-web-app-title" content="周易">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <title>周易</title>
</head>
<body>
    <main class="app-shell" id="captureArea">
        <header class="app-header">
            <div class="brand-lockup">
                <div class="brand-mark" aria-hidden="true">
                    <img src="assets/taichi.png" alt="">
                </div>
                <div>
                    <p class="eyebrow">大衍筮法</p>
                    <h1>周易</h1>
                </div>
            </div>
            <button id="btnExplain" class="icon-button" type="button" aria-label="使用說明">?</button>
        </header>

        <section class="question-panel" aria-labelledby="questionTitle">
            <div class="section-heading">
                <p class="eyebrow">占問</p>
                <h2 id="questionTitle">來者何人，欲問何事</h2>
            </div>

            <div class="field-grid">
                <label class="input-group" for="userName">
                    <span>姓名</span>
                    <input type="text" id="userName" placeholder="某" autocomplete="name">
                </label>

                <label class="input-group input-group-wide" for="userQuestion">
                    <span>所問</span>
                    <input type="text" id="userQuestion" placeholder="例：是否適合赴美讀書">
                </label>
            </div>

            <div class="action-row">
                <button id="btnStart" class="button button-primary" type="button" disabled>起卦</button>
                <button id="btnShot" class="button button-ghost" type="button">截圖</button>
            </div>
        </section>

        <section class="reading-panel" aria-live="polite">
            <p id="resultText" class="invocation">卦曰：來者何人？欲問何事？</p>
            <p id="castTime" class="timestamp"></p>
        </section>

        <section class="hexagram-grid" aria-label="卦象">
            <article class="hexagram-card">
                <div class="hexagram-card-header">
                    <span>本卦</span>
                    <strong id="hGuaName">未起</strong>
                </div>
                <div id="hGuaImages" class="yao-images" aria-label="本卦爻象"></div>
            </article>

            <article class="hexagram-card">
                <div class="hexagram-card-header">
                    <span>之卦</span>
                    <strong id="gGuaName">未起</strong>
                </div>
                <div id="gGuaImages" class="yao-images" aria-label="之卦爻象"></div>
            </article>
        </section>

        <section class="interpretation-panel" aria-labelledby="interpretationTitle">
            <div class="section-heading">
                <p class="eyebrow">卦辭與爻辭</p>
                <h2 id="interpretationTitle">待起卦</h2>
            </div>
            <div id="guaExplanation" class="interpretation-empty">起卦後，卦辭與變爻會在此呈現。</div>
        </section>

        <footer class="site-footer">
            <span>本網站由 Yu-Hsiang Chang 開發</span>
            <a href="https://mibsteven.github.io" target="_blank" rel="noopener noreferrer">https://mibsteven.github.io</a>
        </footer>
    </main>

    <dialog id="explanationDialog" class="dialog">
        <div class="dialog-content">
            <div class="dialog-header">
                <h2>使用說明</h2>
                <button id="btnCloseDialog" class="icon-button" type="button" aria-label="關閉">x</button>
            </div>
            <ul>
                <li>本程式模擬蓍草占卦。</li>
                <li>請守「不誠不占，不義不占，不疑不占」。</li>
                <li>一次詢問一個問題，多問可分次起卦。</li>
                <li>本卦為當下之象，之卦為變化之向。</li>
                <li>紅色爻線為變爻。</li>
            </ul>
        </div>
    </dialog>

    <script src="yijing-core.js"></script>
    <script src="ui.js"></script>
</body>
</html>
